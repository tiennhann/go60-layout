draw_config:
  # Highlight every key that switches/activates a layer in amber so the
  # layer "entry points" are easy to spot on the rendered keymap.
  svg_extra_style: |
    rect.layeract {
        fill: #ffd166;
    }

parse_config:
  raw_binding_map:
    # --- Layer activation keys (colored via type: layeract) ---
    "&magic LAYER_Magic 0":
      t: Magic
      type: layeract
    "&keypad_td":
      t: Keypad
      type: layeract
    "&symbol_td":
      t: Symbol
      type: layeract
    "&mo LAYER_Symbol":
      t: Symbol
      type: layeract
    "&mo LAYER_Nav":
      t: Nav
      type: layeract
    "&tog LAYER_Mouse":
      t: Mouse Toggle
      type: layeract
    "&mo LAYER_MouseSlow":
      t: Slower
      type: layeract
    "&mo LAYER_MouseFast":
      t: Faster
      type: layeract
    "&to LAYER_Base":
      t: Base
      type: layeract
    # --- Magic / firmware ---
    "&bt_0": BT 0
    "&bt_1": BT 1
    "&bt_2": BT 2
    "&bt_3": BT 3
    "&out OUT_USB": USB Out
    "&bootloader": Bootloader
    "&sys_reset": Reset
    # Clipboard (macOS Cmd) on the Mouse layer
    "&kp LG(Z)": Undo
    "&kp LG(X)": Cut
    "&kp LG(C)": Copy
    "&kp LG(V)": Paste
    # Mouse layer: clicks, side buttons, sticky mods
    "&mkp LCLK": Left Click
    "&mkp RCLK": Right Click
    "&mkp MB4": Back Button
    "&mkp MB5": Forward Button
    "&sk LCTRL": Sticky Ctrl
    "&sk LALT": Sticky Alt
    "&sk LGUI": Sticky Cmd
    "&sk LSHFT": Sticky Shift
    # Mouse layer top row: macOS Mission Control navigation
    "&kp LC(UP)": Mission Control
    "&kp LC(DOWN)": App Expose
    "&kp LC(LEFT)": Prev Space
    "&kp LC(RIGHT)": Next Space
    # Navigation layer (macOS)
    "&kp LC(LS(TAB))": Prev Tab
    "&kp LC(TAB)": Next Tab
    "&kp LG(LBKT)": Browser Back
    "&kp LG(RBKT)": Browser Fwd
    "&kp LA(LS(LEFT))": Select Word Back
    "&kp LA(LS(RIGHT))": Select Word
    "&select_line": Select Line
    "&search_selected": Search Selected
    "&kp LC(LG(LS(N4)))": Copy Area Screenshot
    "&kp LC(LG(LS(N3)))": Copy Screenshot
    "&kp LG(F)": Find
    "&kp LG(LS(G))": Find Prev
    "&kp LG(G)": Find Next
