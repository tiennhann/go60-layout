CONFIG_ZMK_POINTING_SMOOTH_SCROLLING=y

# Enlarge the input-processing thread stack. The default (512) can overflow when
# several input processors are chained on a listener (scaler/transform/scroll/
# code-mapper/temp-layer), which makes the trackpad intermittently freeze.
CONFIG_INPUT_THREAD_STACK_SIZE=2048

# Boost BLE transmit power for a more reliable wireless link to the host.
# Cursor movement is a continuous event stream; a weak/congested BLE connection
# shows up as the pointer freezing or lagging. Negligible battery impact.
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
