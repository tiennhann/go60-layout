CONFIG_ZMK_POINTING_SMOOTH_SCROLLING=y

# Enlarge the input-processing thread stack. The default (512) can overflow when
# several input processors are chained on a listener (scaler/transform/scroll/
# code-mapper/temp-layer), which makes the trackpad intermittently freeze.
CONFIG_INPUT_THREAD_STACK_SIZE=2048

# Boost BLE transmit power for a stronger, lower-latency link to the host.
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Pin a fast BLE connection interval and forbid skipped connection events.
# ZMK defaults (MAX_INT=12 / LATENCY=30) let the host negotiate a slow 15ms
# interval and skip up to 30 events, which makes the wireless cursor feel laggy.
# Forcing 7.5ms (6) with zero latency gives the snappiest pointer the BT spec
# allows. Trade-off: slightly higher battery drain.
CONFIG_BT_PERIPHERAL_PREF_MIN_INT=6
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=6
CONFIG_BT_PERIPHERAL_PREF_LATENCY=0
CONFIG_BT_PERIPHERAL_PREF_TIMEOUT=400

# Mouse gesture module (kot149/zmk-mouse-gesture). The Kconfig defaults to y
# when the module is present, but set it explicitly for clarity.
CONFIG_ZMK_MOUSE_GESTURE=y
# The gesture input-processor initializes at the same priority band as the
# key_press behavior, which trips Zephyr's build-time init-priority check with
# a false positive. Disable the check so the firmware builds (runtime ordering
# is fine for input processors).
CONFIG_CHECK_INIT_PRIORITIES=n
