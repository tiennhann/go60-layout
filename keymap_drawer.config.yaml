draw_config:
  # Recolor the auto-detected "held" activator key from the default red (#fdd)
  # to amber so each layer shows its activating thumb key in amber.
  svg_extra_style: |
    rect.held, rect.combo.held {
        fill: #ffd166;
    }

parse_config:
  # NOTE: keys listed in raw_binding_map are NOT auto-detected as layer
  # activators, so they would lose the red "held" highlight on the target
  # layer. We therefore leave the momentary thumb activators
  # (&mo LAYER_Symbol / &mo LAYER_Nav) OUT of this map so keymap-drawer marks
  # them red (rect.held) on the Symbol/Nav layers and links their legends.
  raw_binding_map:
    # --- Custom behaviors that the parser can't trace; label them manually ---
    "&magic LAYER_Magic 0": Magic
    "&keypad_td": Keypad
    "&symbol_td": Symbol
    "&to LAYER_Base": Base
    "&tog LAYER_Mouse": Mouse Toggle
    "&mo LAYER_MouseSlow": Slower
    "&mo LAYER_MouseFast": Faster
    # --- Magic / firmware ---
    "&bt_0": BT 0
    "&bt_1": BT 1
    "&bt_2": BT 2
    "&bt_3": BT 3
    "&out OUT_USB": USB Out
    "&bootloader": Bootloader
    "&sys_reset": Reset
    # Clipboard (macOS Cmd) on the Mouse layer
    "&kp LG(Z)": Undo
    "&kp LG(X)": Cut
    "&kp LG(C)": Copy
    "&kp LG(V)": Paste
    # Mouse layer: clicks, side buttons, sticky mods
    "&mkp LCLK": Left Click
    "&mkp RCLK": Right Click
    "&mkp MB4": Back Button
    "&mkp MB5": Forward Button
    "&sk LCTRL": Sticky Ctrl
    "&sk LALT": Sticky Alt
    "&sk LGUI": Sticky Cmd
    "&sk LSHFT": Sticky Shift
    # Mouse layer top row: macOS Mission Control navigation
    "&kp LC(UP)": Mission Control
    "&kp LC(DOWN)": App Expose
    "&kp LC(LEFT)": Prev Space
    "&kp LC(RIGHT)": Next Space
    # Navigation layer (macOS)
    "&kp LC(LS(TAB))": Prev Tab
    "&kp LC(TAB)": Next Tab
    "&kp LG(LBKT)": Browser Back
    "&kp LG(RBKT)": Browser Fwd
    "&kp LA(LS(LEFT))": Select Word Back
    "&kp LA(LS(RIGHT))": Select Word
    "&select_line": Select Line
    "&search_selected": Search Selected
    "&kp LC(LG(LS(N4)))": Copy Area Screenshot
    "&kp LC(LG(LS(N3)))": Copy Screenshot
    "&kp LG(F)": Find
    "&kp LG(LS(G))": Find Prev
    "&kp LG(G)": Find Next
